<div class="min-h-screen p-6 transition-colors duration-300 w-full"
     [ngClass]="isDarkMode ? 'bg-gray-950 text-gray-100' : 'bg-pink-50 text-gray-800'">
  <div class="max-w-7xl mx-auto w-full">
    
    <div class="flex justify-between items-center mb-8 w-full">
      <h1 class="text-3xl font-bold italic transition-colors" [ngClass]="isDarkMode ? 'text-pink-400' : 'text-pink-700'">Dashboard</h1>
      
      <div class="flex items-center gap-3">
        <button (click)="toggleDarkMode()" 
                class="p-2 rounded-lg border font-bold cursor-pointer transition-all text-base shadow-sm active:scale-95"
                [ngClass]="isDarkMode ? 'bg-gray-900 border-gray-700 text-yellow-400' : 'bg-white border-gray-300 text-gray-700'">
          {{ isDarkMode ? '☀️ Light' : '🌙 Dark' }}
        </button>
        <button routerLink="/tasks" class="bg-pink-600 text-white px-4 py-2 rounded-xl cursor-pointer hover:bg-pink-700 transition-colors shadow-md">Go to Tasks →</button>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
      <div class="p-6 rounded-2xl shadow border-l-8 transition-colors"
           [ngClass]="isDarkMode ? 'bg-gray-900 border-pink-500/80 shadow-gray-950/50' : 'bg-white border-pink-500'">
        <h2 class="font-bold [ngClass]='isDarkMode ? \'text-pink-400\' : \'text-pink-600\''">Total Tasks</h2>
        <p class="text-4xl font-bold transition-colors" [ngClass]="isDarkMode ? 'text-gray-200' : 'text-gray-700'">{{ tasks.length }}</p>
      </div>
      
      <div class="p-6 rounded-2xl shadow border-l-8 transition-colors"
           [ngClass]="isDarkMode ? 'bg-gray-900 border-green-500/80 shadow-gray-950/50' : 'bg-white border-green-500'">
        <h2 class="font-bold [ngClass]='isDarkMode ? \'text-green-400\' : \'text-green-600\''">Completed</h2>
        <p class="text-4xl font-bold transition-colors" [ngClass]="isDarkMode ? 'text-gray-200' : 'text-gray-700'">{{ completed }}</p>
      </div>
      
      <div class="p-6 rounded-2xl shadow border-l-8 transition-colors"
           [ngClass]="isDarkMode ? 'bg-gray-900 border-red-500/80 shadow-gray-950/50' : 'bg-white border-red-500'">
        <h2 class="font-bold [ngClass]='isDarkMode ? \'text-red-400\' : \'text-red-600\''">Pending</h2>
        <p class="text-4xl font-bold transition-colors" [ngClass]="isDarkMode ? 'text-gray-200' : 'text-gray-700'">{{ pending }}</p>
      </div>
    </div>

    <div class="rounded-2xl shadow p-6 border transition-colors w-full"
         [ngClass]="isDarkMode ? 'bg-gray-900 border-gray-800' : 'bg-white border-pink-100'">
       <h2 class="text-xl font-bold mb-4 transition-colors" [ngClass]="isDarkMode ? 'text-pink-400' : 'text-pink-600'">Recent Summary</h2>
       
       <div class="w-full overflow-x-auto">
         <p-table [value]="tasks" [paginator]="true" [rows]="5" styleClass="p-datatable-sm w-full" [tableStyle]="{'min-width': '100%', 'width': '100%'}">
            <ng-template pTemplate="header">
              <tr class="border-b transition-colors" [ngClass]="isDarkMode ? 'bg-gray-950 text-pink-400 border-gray-800' : 'bg-pink-50 text-pink-700 border-gray-200'">
                <th class="p-4 text-left w-[70%]">Task Name</th>
                <th class="p-4 text-left w-[30%]">Status</th>
              </tr>
            </ng-template>
            <ng-template pTemplate="body" let-t>
              <tr class="border-b transition-colors" [ngClass]="isDarkMode ? 'border-gray-800/50 hover:bg-gray-800/30 text-gray-300' : 'border-gray-100 hover:bg-pink-50/20 text-gray-700'">
                <td class="p-4 font-semibold break-words whitespace-normal">{{t.taskName}}</td>
                <td class="p-4 text-sm font-medium">{{t.status}}</td>
              </tr>
            </ng-template>
         </p-table>
       </div>
    </div>
  </div>
</div>
